name: CI

on:
  push:
    branches:
      - main
      - chore/repository-standardization
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

# ---------------------------------------------------------------------------
# VAGRANT VALIDATION
# ---------------------------------------------------------------------------
  validate-vagrantfiles:
    name: Validate Vagrantfiles
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Vagrant
        run: |
          sudo apt-get update
          sudo apt-get install -y vagrant

      - name: Validate AD Pentest Vagrantfile
        run: |
          cd labs/security/ad-pentest
          vagrant validate
        env:
          VAGRANT_DEFAULT_PROVIDER: libvirt

      - name: Validate AD Pentest VLAN Vagrantfile
        run: |
          cd labs/security/ad-pentest-vlan
          vagrant validate
        env:
          VAGRANT_DEFAULT_PROVIDER: libvirt

      - name: Validate DevOps Lab Vagrantfile
        run: |
          cd labs/infrastructure/devops-linux-lab
          vagrant validate
        env:
          VAGRANT_DEFAULT_PROVIDER: libvirt

# ---------------------------------------------------------------------------
# SHELLCHECK
# ---------------------------------------------------------------------------
  lint-shell-scripts:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          FAILED=0
          while IFS= read -r -d '' script; do
            echo "Checking $script"
            shellcheck --severity=error \
              --exclude=SC1091,SC2086,SC2034 \
              "$script" || FAILED=1
          done < <(find . -name "*.sh" -not -path "./.git/*" -print0)

          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi

# ---------------------------------------------------------------------------
# PYTHON LINT + FORMAT + SYNTAX
# ---------------------------------------------------------------------------
  lint-python-scripts:
    name: Lint Python Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tools
        run: |
          pip install pylint flake8 black isort

      - name: Syntax check
        run: |
          find . -name "*.py" -not -path "./.git/*" -print0 |
          while IFS= read -r -d '' file; do
            python3 -m py_compile "$file"
          done

      - name: Run Black (format check)
        run: black --check .

      - name: Run isort (import check)
        run: isort --check-only .

      - name: Run flake8
        run: flake8 --max-line-length=120 .

      - name: Run pylint
        run: pylint $(find . -name "*.py" -not -path "./.git/*")

# ---------------------------------------------------------------------------
# MARKDOWN VALIDATION
# ---------------------------------------------------------------------------
  validate-markdown:
    name: Validate Markdown Links
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check Markdown
        run: |
          FAILED=0

          cat > /tmp/mlc.json << EOF
          {
            "ignorePatterns": [
              { "pattern": "^https?://" },
              { "pattern": "^mailto:" },
              { "pattern": "^tel:" }
            ]
          }
          EOF

          find . -name "*.md" -print0 |
          while IFS= read -r -d '' file; do
            markdown-link-check --config /tmp/mlc.json "$file" || FAILED=1
          done

          exit $FAILED

# ---------------------------------------------------------------------------
# SECURITY SCAN
# ---------------------------------------------------------------------------
  security-scan:
    name: Security Scan (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: |
          bandit -r . -ll -i