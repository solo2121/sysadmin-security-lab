name: CI

on:
  push:
    branches:
      - main
      - chore/repository-standardization
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-vagrantfiles:
    name: Validate Vagrantfiles
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Install Vagrant
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg lsb-release wget
          wget -O- https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update
          sudo apt-get install -y vagrant

      - name: Validate Vagrantfiles
        env:
          VAGRANT_DEFAULT_PROVIDER: libvirt
          HARBOR_PASS: ${{ secrets.HARBOR_PASS }}
        run: |
          set -eo pipefail
          export VAGRANT_DEFAULT_PROVIDER="${VAGRANT_DEFAULT_PROVIDER}"
          export HARBOR_PASS="${HARBOR_PASS:-CI_Test_Password_123}"

          for dir in \
            labs/security/ad-pentest \
            labs/security/ad-pentest-vlan \
            labs/infrastructure/devops-linux-lab
          do
            echo "--- Validating $dir ---"
            (cd "$dir" && vagrant validate)
          done

      - name: Debug Vagrantfiles (on failure)
        if: failure()
        run: |
          echo "=== vagrant / ruby diagnostics ==="
          vagrant --version || true
          ruby --version || true
          echo "=== ruby syntax checks ==="
          ruby -c labs/security/ad-pentest/Vagrantfile 2>&1 || true
          ruby -c labs/security/ad-pentest-vlan/Vagrantfile 2>&1 || true
          ruby -c labs/infrastructure/devops-linux-lab/Vagrantfile 2>&1 || true

  lint-shell-scripts:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run ShellCheck
        run: |
          set -eo pipefail
          find . -name "*.sh" -not -path "./.git/*" -print0 |
            xargs -0 -n1 shellcheck --severity=error \
              --exclude=SC1091,SC2086,SC2034

  lint-python-scripts:
    name: Lint Python Scripts
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tools
        run: |
          pip install pylint flake8 black isort

      - name: Syntax check
        run: |
          set -e
          while IFS= read -r -d '' file; do
            python3 -m py_compile "$file"
          done < <(find . -name "*.py" -not -path "./.git/*" -print0)

      - name: Run Black (format check)
        run: black --check .

      - name: Run isort (import check)
        run: isort --check-only .

      - name: Run flake8
        run: flake8 --max-line-length=120 .

      - name: Run pylint
        run: find . -name "*.py" -not -path "./.git/*" | xargs pylint

  validate-markdown:
    name: Validate Markdown Links
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check Markdown
        run: |
          FAILED=0

          cat > /tmp/mlc.json << EOF
          {
            "ignorePatterns": [
              { "pattern": "^https?://" },
              { "pattern": "^mailto:" },
              { "pattern": "^tel:" }
            ]
          }
          EOF

          find . -name "*.md" -print0 |
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            markdown-link-check --quiet --config /tmp/mlc.json "$file" || FAILED=1
          done

          [ "$FAILED" -eq 0 ]

  security-scan:
    name: Security Scan (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: |
          bandit -r . -ll