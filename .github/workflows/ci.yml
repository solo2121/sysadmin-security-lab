# =============================================================================
# Sysadmin Security Lab — CI Pipeline
# =============================================================================
#
# Jobs:
#   validate-vagrantfiles  — syntax check all three Vagrantfiles
#   lint-shell-scripts     — shellcheck errors only (not warnings)
#   lint-python-scripts    — syntax check only (flake8 informational)
#   security-scan          — bandit informational only (never blocks)
#
# Philosophy:
#   Only REAL errors block the build. Style warnings and security
#   findings in intentional pentest scripts are reported but do not
#   fail the pipeline.
#
# =============================================================================

name: CI

on:
  push:
    branches:
      - main
      - chore/repository-standardization
  pull_request:
    branches:
      - main

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: Validate all three Vagrantfiles
  # ---------------------------------------------------------------------------
  validate-vagrantfiles:
    name: Validate Vagrantfiles
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vagrant
        run: |
          wget -O - https://apt.releases.hashicorp.com/gpg \
            | sudo gpg --dearmor \
                -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) \
            signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] \
            https://apt.releases.hashicorp.com $(lsb_release -cs) main" \
            | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update -qq
          sudo apt-get install -y vagrant

      - name: Install Vagrant plugins
        run: |
          vagrant plugin install vagrant-reload
          vagrant plugin install vagrant-libvirt
          vagrant plugin list

      - name: Validate AD Pentest Vagrantfile
        run: vagrant validate
        working-directory: labs/security/ad-pentest
        env:
          VAGRANT_DEFAULT_PROVIDER: libvirt

      - name: Validate AD Pentest VLAN Vagrantfile
        run: vagrant validate
        working-directory: labs/security/ad-pentest-vlan
        env:
          VAGRANT_DEFAULT_PROVIDER: libvirt

      - name: Validate DevOps Lab Vagrantfile
        run: vagrant validate
        working-directory: labs/infrastructure/devops-linux-lab
        env:
          VAGRANT_DEFAULT_PROVIDER: libvirt

  # ---------------------------------------------------------------------------
  # Job 2: Shell script linting — errors only, not style warnings
  # ---------------------------------------------------------------------------
  lint-shell-scripts:
    name: Lint Shell Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Run shellcheck (errors only)
        run: |
          echo "Scanning shell scripts for errors..."
          FAILED=0
          CHECKED=0

          while IFS= read -r -d '' script; do
            CHECKED=$((CHECKED + 1))
            # SC1091 — not following sourced file (expected in lab scripts)
            # SC2086 — double quote to prevent globbing (too noisy)
            # SC2034 — variable appears unused (false positives in sourced scripts)
            # SC2155 — declare and assign separately (style, not error)
            # SC2164 — use cd ... || exit (style)
            # SC2181 — check exit code directly (style)
            # SC2207 — mapfile not available everywhere (portability warning)
            if ! shellcheck \
              --severity=error \
              --exclude=SC1091,SC2086,SC2034,SC2155,SC2164,SC2181,SC2207 \
              "$script" 2>&1; then
              echo "FAILED: $script"
              FAILED=1
            fi
          done < <(find . -name "*.sh" -not -path "./.git/*" -print0)

          echo "Checked $CHECKED shell scripts"
          if [ "$FAILED" -eq 1 ]; then
            echo "shellcheck found real errors — fix them before merging"
            exit 1
          fi
          echo "All shell scripts passed"

  # ---------------------------------------------------------------------------
  # Job 3: Python syntax check — style warnings are informational only
  # ---------------------------------------------------------------------------
  lint-python-scripts:
    name: Lint Python Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: pip install flake8 --quiet

      - name: Syntax check — blocks on real errors
        run: |
          echo "Checking Python syntax..."
          FAILED=0
          CHECKED=0

          while IFS= read -r -d '' script; do
            CHECKED=$((CHECKED + 1))
            if ! python3 -m py_compile "$script" 2>&1; then
              echo "SYNTAX ERROR: $script"
              FAILED=1
            fi
          done < <(find . -name "*.py" -not -path "./.git/*" -print0)

          echo "Checked $CHECKED Python files"
          if [ "$FAILED" -eq 1 ]; then
            echo "Fix syntax errors before merging"
            exit 1
          fi
          echo "All Python files have valid syntax"

      - name: Style check — informational only (never blocks)
        run: |
          echo "Running flake8 style check (informational)..."
          flake8 \
            --max-line-length=120 \
            --extend-ignore=E501,W503,E302,E303,W291,W293,E711,E712,\
          E128,W292,F401,E722,F811,E305 \
            --exclude=.git,__pycache__ \
            $(find . -name "*.py" -not -path "./.git/*") \
            || true
          echo "Flake8 complete (warnings above are informational)"

  # ---------------------------------------------------------------------------
  # Job 4: Bandit security scan — always informational, never blocks
  #
  # Pentest and security tooling intentionally uses patterns that bandit
  # flags (telnet, paramiko, shell=True). These are expected and reviewed.
  # The scan runs to surface unintentional issues, not to block CI.
  # ---------------------------------------------------------------------------
  security-scan:
    name: Security Scan (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install bandit --quiet

      - name: Run bandit (informational — never blocks)
        run: |
          echo "Running bandit security scan (informational only)..."
          PY_FILES=$(find . -name "*.py" -not -path "./.git/*" | tr '\n' ' ')

          if [ -z "$PY_FILES" ]; then
            echo "No Python files found"
            exit 0
          fi

          # Run bandit but always exit 0 — findings are informational.
          # Security scripts in this repo intentionally use patterns
          # that bandit flags (telnet, paramiko, shell execution).
          # These are reviewed during code review, not blocked in CI.
          bandit \
            --recursive \
            --severity-level medium \
            --confidence-level medium \
            --exclude ./.git \
            --format txt \
            $PY_FILES 2>&1 || true

          echo "Bandit scan complete (see findings above for review)"
          exit 0
