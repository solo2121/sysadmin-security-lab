labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Suggest a new lab scenario, attack path, tooling addition, or
        improvement. Check [`ROADMAP.md`](../../ROADMAP.md) first — it
        might already be planned.
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: Why would this be useful?
      description: What's the use case — learning goal, missing coverage, realism, etc.?
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Which area does this affect?
      options:
        - AD pentest lab
        - AD pentest VLAN lab
        - DevOps/DevSecOps lab
        - Documentation
        - CI/tooling
        - Other
    validations:
      required: false
