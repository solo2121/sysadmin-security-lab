labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for setup problems, "how do I..." questions, or anything
        you're stuck on while running either lab. Check
        [`troubleshooting.md`](../../troubleshooting.md) and
        [`docs/README.md`](../../docs/README.md) first — your question may
        already be answered there.
  - type: textarea
    id: question
    attributes:
      label: What are you trying to do?
      description: Include which lab, which step, and what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Host OS, output of `scripts/check-prerequisites.sh`, Vagrant/libvirt versions.
    validations:
      required: false
  - type: textarea
    id: what-tried
    attributes:
      label: What have you already tried?
    validations:
      required: false
