  <g filter="drop-shadow(0 2px 8px rgba(0,0,0,0.1))">
    <rect x="70" y="450" width="590" height="100" rx="10" fill="url(#grad-security)"/>
  </g>
  <text x="365" y="485" text-anchor="middle" class="component-title">🛡️ AD Certificate Services (AD CS)</text>
  <text x="365" y="505" text-anchor="middle" class="component-text">Certification Authority | PKI Infrastructure</text>
  <text x="365" y="522" text-anchor="middle" class="component-text">ESC1 • ESC3 • ESC4 • ESC7 • ESC9 Escalation Paths</text>
  
