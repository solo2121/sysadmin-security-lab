<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <style type="text/css">
      <![CDATA[
      .title { font-size: 42px; font-weight: 800; fill: #1a1a1a; font-family: Arial, sans-serif; text-anchor: middle; }
      .subtitle { font-size: 15px; font-weight: 500; fill: #666666; font-family: Arial, sans-serif; text-anchor: middle; }
      .section-title { font-size: 18px; font-weight: 700; fill: #ffffff; font-family: Arial, sans-serif; }
      .component-title { font-size: 14px; font-weight: 700; fill: #ffffff; font-family: Arial, sans-serif; }
      .component-text { font-size: 12px; fill: #ffffff; font-family: Arial, sans-serif; opacity: 0.95; }
      .label { font-size: 13px; fill: #2c3e50; font-family: Arial, sans-serif; font-weight: 600; }
      .small-label { font-size: 11px; fill: #666666; font-family: Arial, sans-serif; }
      ]]>
    </style>
    
    <linearGradient id="grad-lab1-dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34495e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="grad-ad-component" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="grad-security" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="grad-lab2-dark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#229954;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="grad-k8s-component" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2980b9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e5a8e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="grad-devops-accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#16a085;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#117a65;stop-opacity:1" />
    </linearGradient>
    
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1400" height="900" fill="#f8f9fa"/>
  
  <!-- Main Title -->
  <text x="700" y="45" class="title">Enterprise Architecture Overview</text>
  <text x="700" y="65" class="subtitle">Active Directory Security Lab | DevOps/DevSecOps Platform | Kubernetes Operations</text>
  
  <!-- Divider -->
  <line x1="50" y1="80" x2="1350" y2="80" stroke="#d0d0d0" stroke-width="2"/>
  
  <!-- ========== LAB 1: ACTIVE DIRECTORY ========== -->
  
  <!-- Lab 1 Container -->
  <g filter="url(#shadow)">
    <rect x="50" y="110" width="630" height="750" rx="14" fill="#f5f7fa" stroke="#2c3e50" stroke-width="3"/>
  </g>
  
  <!-- Lab 1 Header -->
  <rect x="50" y="110" width="630" height="60" rx="14" fill="url(#grad-lab1-dark)"/>
  <text x="365" y="150" text-anchor="middle" class="section-title">Active Directory Pentest Lab</text>
  <text x="365" y="180" text-anchor="middle" class="small-label">Network: 172.28.128.0/24 | Domain: lab.local</text>
  
  <!-- Domain Controller -->
  <g filter="url(#shadow)">
    <rect x="70" y="200" width="590" height="100" rx="10" fill="url(#grad-ad-component)"/>
  </g>
  <text x="365" y="235" text-anchor="middle" class="component-title">Domain Controller</text>
  <text x="365" y="255" text-anchor="middle" class="component-text">Windows Server 2022 | lab.local | Primary AD Infrastructure</text>
  <text x="365" y="272" text-anchor="middle" class="component-text">Kerberos | DNS | LDAP | Authentication</text>
  
  <!-- Member Servers -->
  <g filter="url(#shadow)">
    <rect x="70" y="320" width="140" height="110" rx="10" fill="url(#grad-ad-component)"/>
  </g>
  <text x="140" y="352" text-anchor="middle" class="component-title">SQL Server</text>
  <text x="140" y="372" text-anchor="middle" class="component-text">Database</text>
  <text x="140" y="386" text-anchor="middle" class="component-text">Services</text>
  
  <g filter="url(#shadow)">
    <rect x="230" y="320" width="140" height="110" rx="10" fill="url(#grad-ad-component)"/>
  </g>
  <text x="300" y="352" text-anchor="middle" class="component-title">Exchange</text>
  <text x="300" y="372" text-anchor="middle" class="component-text">Mail</text>
  <text x="300" y="386" text-anchor="middle" class="component-text">Services</text>
  
  <g filter="url(#shadow)">
    <rect x="390" y="320" width="140" height="110" rx="10" fill="url(#grad-ad-component)"/>
  </g>
  <text x="460" y="352" text-anchor="middle" class="component-title">SharePoint</text>
  <text x="460" y="372" text-anchor="middle" class="component-text">Collaboration</text>
  <text x="460" y="386" text-anchor="middle" class="component-text">Platform</text>
  
  <g filter="url(#shadow)">
    <rect x="550" y="320" width="110" height="110" rx="10" fill="url(#grad-ad-component)"/>
  </g>
  <text x="605" y="352" text-anchor="middle" class="component-title">Print</text>
  <text x="605" y="372" text-anchor="middle" class="component-text">Server</text>
  <text x="605" y="386" text-anchor="middle" class="component-text">Services</text>
  
  <!-- AD Certificate Services -->
  <g filter="url(#shadow)">
    <rect x="70" y="450" width="590" height="100" rx="10" fill="url(#grad-security)"/>
  </g>
  <text x="365" y="485" text-anchor="middle" class="component-title">AD Certificate Services (AD CS)</text>
  <text x="365" y="505" text-anchor="middle" class="component-text">Certification Authority | PKI Infrastructure</text>
  <text x="365" y="522" text-anchor="middle" class="component-text">ESC1-ESC9 Escalation Paths</text>
  
  <!-- Attack Layer -->
  <g filter="url(#shadow)">
    <rect x="70" y="570" width="280" height="120" rx="10" fill="#f39c12"/>
  </g>
  <text x="210" y="605" text-anchor="middle" class="component-title">Attacker VM</text>
  <text x="210" y="625" text-anchor="middle" class="component-text">Kali Linux</text>
  <text x="210" y="642" text-anchor="middle" class="component-text">Penetration Testing</text>
  <text x="210" y="659" text-anchor="middle" class="component-text">Reconnaissance Tools</text>
  
  <g filter="url(#shadow)">
    <rect x="380" y="570" width="280" height="120" rx="10" fill="#9b59b6"/>
  </g>
  <text x="520" y="605" text-anchor="middle" class="component-title">Cloud Simulation</text>
  <text x="520" y="625" text-anchor="middle" class="component-text">LocalStack (AWS)</text>
  <text x="520" y="642" text-anchor="middle" class="component-text">S3, IAM, EC2</text>
  <text x="520" y="659" text-anchor="middle" class="component-text">Cloud Attack Vectors</text>
  
  <!-- AI & Legacy -->
  <g filter="url(#shadow)">
    <rect x="70" y="710" width="280" height="95" rx="10" fill="#8e44ad"/>
  </g>
  <text x="210" y="740" text-anchor="middle" class="component-title">AI/LLM Security</text>
  <text x="210" y="759" text-anchor="middle" class="component-text">Prompt Injection Testing</text>
  <text x="210" y="775" text-anchor="middle" class="component-text">RAG Security Research</text>
  
  <g filter="url(#shadow)">
    <rect x="380" y="710" width="280" height="95" rx="10" fill="#95a5a6"/>
  </g>
  <text x="520" y="740" text-anchor="middle" class="component-title">Legacy Targets</text>
  <text x="520" y="759" text-anchor="middle" class="component-text">Metasploitable2</text>
  <text x="520" y="775" text-anchor="middle" class="component-text">OWASP Juice Shop</text>
  
  <!-- ========== LAB 2: DEVOPS / DEVSECOPS ========== -->
  
  <!-- Lab 2 Container -->
  <g filter="url(#shadow)">
    <rect x="720" y="110" width="630" height="750" rx="14" fill="#f5fbf8" stroke="#27ae60" stroke-width="3"/>
  </g>
  
  <!-- Lab 2 Header -->
  <rect x="720" y="110" width="630" height="60" rx="14" fill="url(#grad-lab2-dark)"/>
  <text x="1035" y="150" text-anchor="middle" class="section-title">DevOps / DevSecOps Lab</text>
  <text x="1035" y="180" text-anchor="middle" class="small-label">Kubernetes Cluster | k3s | Cloud-Native Platform</text>
  
  <!-- Kubernetes Control Plane -->
  <g filter="url(#shadow)">
    <rect x="740" y="200" width="590" height="100" rx="10" fill="url(#grad-k8s-component)"/>
  </g>
  <text x="1035" y="235" text-anchor="middle" class="component-title">Kubernetes Control Plane</text>
  <text x="1035" y="255" text-anchor="middle" class="component-text">k3s Cluster | Kind | K3d | Multi-cluster Ready</text>
  <text x="1035" y="272" text-anchor="middle" class="component-text">Master Node | API Server | etcd | Scheduler</text>
  
  <!-- Worker Nodes -->
  <g filter="url(#shadow)">
    <rect x="740" y="320" width="180" height="110" rx="10" fill="url(#grad-k8s-component)"/>
  </g>
  <text x="830" y="352" text-anchor="middle" class="component-title">Worker-1</text>
  <text x="830" y="372" text-anchor="middle" class="component-text">Node Instance</text>
  <text x="830" y="386" text-anchor="middle" class="component-text">Container Runtime</text>
  
  <g filter="url(#shadow)">
    <rect x="940" y="320" width="180" height="110" rx="10" fill="url(#grad-k8s-component)"/>
  </g>
  <text x="1030" y="352" text-anchor="middle" class="component-title">Worker-2</text>
  <text x="1030" y="372" text-anchor="middle" class="component-text">Node Instance</text>
  <text x="1030" y="386" text-anchor="middle" class="component-text">Container Runtime</text>
  
  <g filter="url(#shadow)">
    <rect x="1140" y="320" width="190" height="110" rx="10" fill="url(#grad-k8s-component)"/>
  </g>
  <text x="1235" y="352" text-anchor="middle" class="component-title">Worker-3</text>
  <text x="1235" y="372" text-anchor="middle" class="component-text">Node Instance</text>
  <text x="1235" y="386" text-anchor="middle" class="component-text">Container Runtime</text>
  
  <!-- Container Registry & GitOps -->
  <g filter="url(#shadow)">
    <rect x="740" y="450" width="280" height="100" rx="10" fill="url(#grad-devops-accent)"/>
  </g>
  <text x="880" y="485" text-anchor="middle" class="component-title">Harbor Registry</text>
  <text x="880" y="505" text-anchor="middle" class="component-text">Container Registry</text>
  <text x="880" y="522" text-anchor="middle" class="component-text">Image Scanning and Policies</text>
  
  <g filter="url(#shadow)">
    <rect x="1050" y="450" width="280" height="100" rx="10" fill="url(#grad-devops-accent)"/>
  </g>
  <text x="1190" y="485" text-anchor="middle" class="component-title">Argo CD</text>
  <text x="1190" y="505" text-anchor="middle" class="component-text">GitOps Automation</text>
  <text x="1190" y="522" text-anchor="middle" class="component-text">Continuous Deployment</text>
  
  <!-- Observability Stack -->
  <g filter="url(#shadow)">
    <rect x="740" y="570" width="180" height="120" rx="10" fill="#e67e22"/>
  </g>
  <text x="830" y="605" text-anchor="middle" class="component-title">Prometheus</text>
  <text x="830" y="625" text-anchor="middle" class="component-text">Metrics</text>
  <text x="830" y="642" text-anchor="middle" class="component-text">Monitoring</text>
  <text x="830" y="659" text-anchor="middle" class="component-text">Collection</text>
  
  <g filter="url(#shadow)">
    <rect x="940" y="570" width="180" height="120" rx="10" fill="#e67e22"/>
  </g>
  <text x="1030" y="605" text-anchor="middle" class="component-title">Grafana</text>
  <text x="1030" y="625" text-anchor="middle" class="component-text">Dashboards</text>
  <text x="1030" y="642" text-anchor="middle" class="component-text">Visualization</text>
  <text x="1030" y="659" text-anchor="middle" class="component-text">Analytics</text>
  
  <g filter="url(#shadow)">
    <rect x="1140" y="570" width="190" height="120" rx="10" fill="#e67e22"/>
  </g>
  <text x="1235" y="605" text-anchor="middle" class="component-title">Loki</text>
  <text x="1235" y="625" text-anchor="middle" class="component-text">Log</text>
  <text x="1235" y="642" text-anchor="middle" class="component-text">Aggregation</text>
  <text x="1235" y="659" text-anchor="middle" class="component-text">Analysis</text>
  
  <!-- Runtime Security -->
  <g filter="url(#shadow)">
    <rect x="740" y="710" width="280" height="95" rx="10" fill="url(#grad-security)"/>
  </g>
  <text x="880" y="740" text-anchor="middle" class="component-title">Falco</text>
  <text x="880" y="759" text-anchor="middle" class="component-text">Runtime Security Detection</text>
  <text x="880" y="775" text-anchor="middle" class="component-text">Threat Detection</text>
  
  <g filter="url(#shadow)">
    <rect x="1050" y="710" width="280" height="95" rx="10" fill="url(#grad-security)"/>
  </g>
  <text x="1190" y="740" text-anchor="middle" class="component-title">Kyverno</text>
  <text x="1190" y="759" text-anchor="middle" class="component-text">Policy Engine and Enforcement</text>
  <text x="1190" y="775" text-anchor="middle" class="component-text">Kubernetes Security</text>
  
  <!-- Footer divider -->
  <line x1="50" y1="880" x2="1350" y2="880" stroke="#d0d0d0" stroke-width="2"/>
  
</svg>