  <text x="365" y="150" text-anchor="middle" class="section-title">🔐 Active Directory Pentest Lab</text>
  
  <!-- Lab 1 Subheader Info -->
  <text x="365" y="180" text-anchor="middle" class="small-label">Network: 172.28.128.0/24 | Domain: lab.local | ~14 VMs</text>
  
  <!-- ---- Domain Controller Component ---- -->
  <g filter="drop-shadow(0 2px 8px rgba(0,0,0,0.1))">
    <rect x="70" y="200" width="590" height="100" rx="10" fill="url(#grad-ad-component)"/>
  </g>
  <text x="365" y="235" text-anchor="middle" class="component-title">🖥️ Domain Controller</text>
  <text x="365" y="255" text-anchor="middle" class="component-text">Windows Server 2022 | lab.local | Primary AD Infrastructure</text>
  <text x="365" y="272" text-anchor="middle" class="component-text">Kerberos • DNS • LDAP • Authentication</text>
  
  <!-- ---- Member Servers Row ---- -->
  <g filter="drop-shadow(0 2px 8px rgba(0,0,0,0.1))">
    <rect x="70" y="320" width="140" height="110" rx="10" fill="url(#grad-ad-component)"/>
  </g>
  <text x="140" y="352" text-anchor="middle" class="component-title">📊 SQL Server</text>
  <text x="140" y="372" text-anchor="middle" class="component-text">Database</text>
  <text x="140" y="386" text-anchor="middle" class="component-text">Services</text>
  
  <g filter="drop-shadow(0 2px 8px rgba(0,0,0,0.1))">
    <rect x="230" y="320" width="140" height="110" rx="10" fill="url(#grad-ad-component)"/>
  </g>
  <text x="300" y="352" text-anchor="middle" class="component-title">📧 Exchange</text>
  <text x="300" y="372" text-anchor="middle" class="component-text">Mail</text>
  <text x="300" y="386" text-anchor="middle" class="component-text">Services</text>
  
  <g filter="drop-shadow(0 2px 8px rgba(0,0,0,0.1))">
    <rect x="390" y="320" width="140" height="110" rx="10" fill="url(#grad-ad-component)"/>
  </g>
  <text x="460" y="352" text-anchor="middle" class="component-title">🤝 SharePoint</text>
  <text x="460" y="372" text-anchor="middle" class="component-text">Collaboration</text>
  <text x="460" y="386" text-anchor="middle" class="component-text">Platform</text>
  
  <g filter="drop-shadow(0 2px 8px rgba(0,0,0,0.1))">
    <rect x="550" y="320" width="110" height="110" rx="10" fill="url(#grad-ad-component)"/>
  </g>
  <text x="605" y="352" text-anchor="middle" class="component-title">🖨️ Print</text>
  <text x="605" y="372" text-anchor="middle" class="component-text">Server</text>
  <text x="605" y="386" text-anchor="middle" class="component-text">Services</text>
  
