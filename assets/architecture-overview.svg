<svg width="680" height="700" viewBox="0 0 680 700" xmlns="http://www.w3.org/2000/svg">
<title>Sysadmin Security Lab architecture</title>
<desc>Two independent lab environments: an Active Directory pentest lab with Kali Linux and Windows Server 2022 domain controller, and a DevOps/DevSecOps lab with a Kubernetes cluster.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#444441" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>
<rect width="680" height="700" fill="#ffffff"/>

<text x="40" y="36" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Lab 1 — Active Directory pentest lab</text>
<text x="40" y="54" font-family="sans-serif" font-size="12" fill="#5F5E5A">Flat network or VLAN-segmented edition</text>

<rect x="40" y="70" width="600" height="220" rx="20" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="60" y="98" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">172.28.128.0/24 — lab.local</text>

<rect x="64" y="116" width="160" height="56" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="144" y="136" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle" dominant-baseline="central">Kali Linux 2026.1</text>
<text x="144" y="156" font-family="sans-serif" font-size="12" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">Attacker platform</text>

<rect x="260" y="116" width="160" height="56" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="136" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53" text-anchor="middle" dominant-baseline="central">Windows Server 2022</text>
<text x="340" y="156" font-family="sans-serif" font-size="12" fill="#0C447C" text-anchor="middle" dominant-baseline="central">Domain controller, AD CS</text>

<rect x="456" y="116" width="160" height="56" rx="10" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="536" y="136" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53" text-anchor="middle" dominant-baseline="central">Member servers</text>
<text x="536" y="156" font-family="sans-serif" font-size="12" fill="#0C447C" text-anchor="middle" dominant-baseline="central">SQL, Exchange, SharePoint</text>

<line x1="224" y1="144" x2="258" y2="144" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="420" y1="144" x2="454" y2="144" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="64" y="194" width="160" height="56" rx="10" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text x="144" y="214" font-family="sans-serif" font-size="14" font-weight="500" fill="#4B1528" text-anchor="middle" dominant-baseline="central">LLM platform</text>
<text x="144" y="234" font-family="sans-serif" font-size="12" fill="#993556" text-anchor="middle" dominant-baseline="central">15 vulnerable endpoints</text>

<rect x="260" y="194" width="160" height="56" rx="10" fill="#FBEAF0" stroke="#993556" stroke-width="0.5"/>
<text x="340" y="214" font-family="sans-serif" font-size="14" font-weight="500" fill="#4B1528" text-anchor="middle" dominant-baseline="central">Cloud simulation</text>
<text x="340" y="234" font-family="sans-serif" font-size="12" fill="#993556" text-anchor="middle" dominant-baseline="central">LocalStack: S3, IAM, EC2</text>

<rect x="456" y="194" width="160" height="56" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="536" y="214" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle" dominant-baseline="central">Legacy targets</text>
<text x="536" y="234" font-family="sans-serif" font-size="12" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">Metasploitable2, Juice Shop</text>

<text x="60" y="276" font-family="sans-serif" font-size="12" fill="#5F5E5A">14 VMs total — VLAN edition adds 5 segmented subnets</text>

<text x="40" y="336" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">Lab 2 — DevOps / DevSecOps lab</text>
<text x="40" y="354" font-family="sans-serif" font-size="12" fill="#5F5E5A">k3s Kubernetes cluster with enterprise tooling</text>

<rect x="40" y="370" width="600" height="220" rx="20" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="60" y="398" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">Local libvirt network</text>

<rect x="64" y="416" width="160" height="56" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="144" y="436" font-family="sans-serif" font-size="14" font-weight="500" fill="#173404" text-anchor="middle" dominant-baseline="central">k3s control plane</text>
<text x="144" y="456" font-family="sans-serif" font-size="12" fill="#3B6D11" text-anchor="middle" dominant-baseline="central">devops-1</text>

<rect x="260" y="416" width="160" height="56" rx="10" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.5"/>
<text x="340" y="436" font-family="sans-serif" font-size="14" font-weight="500" fill="#173404" text-anchor="middle" dominant-baseline="central">k3s workers</text>
<text x="340" y="456" font-family="sans-serif" font-size="12" fill="#3B6D11" text-anchor="middle" dominant-baseline="central">worker-1, worker-2</text>

<rect x="456" y="416" width="160" height="56" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="536" y="436" font-family="sans-serif" font-size="14" font-weight="500" fill="#412402" text-anchor="middle" dominant-baseline="central">Harbor + ArgoCD</text>
<text x="536" y="456" font-family="sans-serif" font-size="12" fill="#854F0B" text-anchor="middle" dominant-baseline="central">Registry, GitOps</text>

<line x1="224" y1="444" x2="258" y2="444" stroke="#3B6D11" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="420" y1="444" x2="454" y2="444" stroke="#854F0B" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="64" y="494" width="270" height="56" rx="10" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="199" y="514" font-family="sans-serif" font-size="14" font-weight="500" fill="#412402" text-anchor="middle" dominant-baseline="central">Prometheus, Grafana, Loki, Falco</text>
<text x="199" y="534" font-family="sans-serif" font-size="12" fill="#854F0B" text-anchor="middle" dominant-baseline="central">Observability and runtime security</text>

<rect x="350" y="494" width="266" height="56" rx="10" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="483" y="514" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A" text-anchor="middle" dominant-baseline="central">Linux practice nodes</text>
<text x="483" y="534" font-family="sans-serif" font-size="12" fill="#5F5E5A" text-anchor="middle" dominant-baseline="central">Ubuntu, Rocky, Alma, openSUSE</text>

<text x="60" y="576" font-family="sans-serif" font-size="12" fill="#5F5E5A">Independent Vagrantfile — no shared network with Lab 1</text>

<rect x="40" y="612" width="600" height="60" rx="14" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="636" font-family="sans-serif" font-size="12" fill="#5F5E5A" text-anchor="middle">Each lab deploys independently via its own Vagrantfile</text>
<text x="340" y="654" font-family="sans-serif" font-size="12" fill="#5F5E5A" text-anchor="middle">KVM / QEMU + libvirt on a Linux host</text>
</svg>
